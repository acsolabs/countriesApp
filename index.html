<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countries App</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="filter-container">
      <input type="text" id="inputSearch" placeholder="Search" />
      <div class="range-container">
        <input type="range" value="24" max="250" id="inputRange" />
        <span id="rangeValue">24</span>
      </div>
      <button class="btnSort" id="minToMax">Asc sort</button>
      <button class="btnSort" id="maxToMin">Desc sort</button>
      <button class="btnSort" id="alpha">Abc sort</button>
    </div>

    <div class="countries-container"></div>

    <script src="index.js"></script>
  </body>
</html>
